<!DOCTYPE html>
{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Request Money{% endblock %}

{% block content %}
<html>
    <head>
        <title>Request Money</title>
    </head>
     <body>
        <div class="container mt-5">
            <h2 class="mb-4">Request Money</h2>

            <p><strong>Balance:</strong> {{ account.balance }}  <strong>Currency:</strong> {{ account.currency }} </p>   
             

        <form method="POST" class="mt-3">
            {% csrf_token %}

            {{ form|crispy }}
            <button type="submit" class="btn btn-primary mt-2">Send Request</button>
        </form>
        </div>
    </body>
</html>
{% endblock %}
