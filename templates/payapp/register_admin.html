{% extends "adminbase.html" %}
{% load crispy_forms_tags %}

{% block title %}Register New Admin{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <h2 class="mb-4 text-center">Register New Admin</h2>

        <div class="card">
            <div class="card-body">

                <form method="POST">
                    {% csrf_token %}

                    {{ form|crispy }}

                    <button type="submit" class="btn btn-primary w-100 mt-2">
                        Register Admin
                    </button>
                </form>

            </div>
        </div>

    </div>
</div>

{% endblock %}
